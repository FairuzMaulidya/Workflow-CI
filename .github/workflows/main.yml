name: CI_MLflow_Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Set up job
      - name: Set up job
        run: echo "🚀 Starting CI job..."

      # 2️⃣ Run checkout
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # 3️⃣ Set up Python
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # 4️⃣ Check Env
      - name: Check Env
        run: |
          echo "🔍 Checking environment..."
          echo "MLFLOW_TRACKING_URI: $MLFLOW_TRACKING_URI"
          python --version

      # 5️⃣ Install dependencies
      - name: Install dependencies
        run: |
          echo "📦 Installing base dependencies..."
          pip install mlflow joblib scikit-learn pandas numpy

      # 6️⃣ Set MLflow Tracking URI
      - name: Set MLflow Tracking URI
        run: |
          echo "🔧 Setting MLflow Tracking URI..."
          export MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          echo "✅ MLflow Tracking URI set."

      # 7️⃣ Run MLflow project
      - name: Run MLflow project
        run: |
          echo "🚀 Running MLflow project..."
          cd MLProject
          mlflow run . --env-manager=local
          echo "✅ MLflow project completed."

      # 8️⃣ Install Python dependencies (for upload)
      - name: Install Python dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      # 9️⃣ Upload to Google Drive
      - name: Upload to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          echo "📤 Uploading MLflow artifacts to Google Drive..."
          cd MLProject
          if [ ! -d "mlruns" ]; then
            echo "❌ Folder mlruns tidak ditemukan. Pastikan MLflow berhasil dijalankan."
            exit 1
          fi

          zip -r mlruns.zip mlruns
          echo "✅ File mlruns.zip berhasil dibuat."
          echo "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > credentials.json

          python <<EOF
          import json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_info = json.load(open("credentials.json"))
          creds = service_account.Credentials.from_service_account_info(
              creds_info, scopes=["https://www.googleapis.com/auth/drive.file"]
          )
          service = build("drive", "v3", credentials=creds)
          file_metadata = {"name": "mlruns.zip", "parents": ["${{ secrets.GDRIVE_FOLDER_ID }}"]}
          media = MediaFileUpload("mlruns.zip", mimetype="application/zip")
          file = service.files().create(body=file_metadata, media_body=media, fields="id").execute()
          print("✅ File berhasil diupload ke Google Drive dengan ID:", file.get("id"))
          EOF

      # 🔟 Complete job
      - name: Complete job
        run: echo "🎉 CI workflow completed successfully!"
