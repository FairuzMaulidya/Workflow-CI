name: CI_MLflow_Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Set up job
        run: echo "Starting CI job..."

      - name: 🧩 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.16.2 joblib scikit-learn pandas numpy matplotlib

      - name: 🧪 Run mlflow project (train model)
        run: |
          cd MLProject
          python modelling.py 100 10
          echo "✅ MLflow project completed."
          ls -R .

      - name: 💾 Upload to GitHub LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git lfs install
          git add -f MLProject/mlruns/
          git commit -m "Save mlruns from CI run" || true
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
          echo "✅ Upload to GitHub LFS selesai."

      - name: 🧾 Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td MLProject/mlruns/0/*/ | head -n 1 | cut -d'/' -f4)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: 🛠️ Build Docker Image (Python 3.10)
        run: |
          cd MLProject
          echo "🔍 Searching for latest MLflow run..."
          RUN_PATH=$(ls -td mlruns/0/*/ | grep -v datasets | head -n 1)
          echo "✅ Found run path: $RUN_PATH"
          if [ ! -d "$RUN_PATH/artifacts/model" ]; then
            echo "❌ Model folder not found at $RUN_PATH/artifacts/model"
            echo "Available structure:"
            ls -R mlruns/
            exit 1
          fi
          mlflow models build-docker \
            --model-uri "$RUN_PATH/artifacts/model" \
            --name "workflow-ci" \
            --build-image python:3.10-slim

      - name: 🏷️ Tag Docker Image
        run: |
          docker tag workflow-ci ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest

      - name: 🚀 Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-ci:latest

      - name: ✅ Complete job
        run: echo "Workflow CI selesai dengan sukses!"
