name: CI_MLflow_Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Set up job
        run: echo "Starting CI job..."

      - name: 🧩 Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: 🔍 Check Env
        run: |
          echo "Python version:"
          python --version
          echo "Current directory:"
          pwd
          echo "List files:"
          ls -R .

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.16.2 joblib scikit-learn pandas numpy matplotlib

      - name: 🔧 Set MLflow Tracking URI
        run: |
          echo "Setting MLflow Tracking URI..."
          export MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}

      - name: 🧪 Run mlflow project (train model)
        run: |
          cd MLProject
          python modelling.py 100 10  # menjalankan training model
          echo "✅ MLflow project completed."
          ls -R .

      # === Ganti Upload to Google Drive menjadi Upload to GitHub LFS ===
      - name: 💾 Set up Git LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git lfs install
          git lfs track "MLProject/mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with Git LFS" || true
          git push origin main

      - name: 📤 Upload to GitHub LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add -f MLProject/mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push origin main
          echo "✅ Upload to GitHub LFS selesai."

      - name: 🧩 Post Set up Python 3.12.7
        run: echo "Post Python setup completed."

      - name: 🧩 Post Run actions/checkout@v3
        run: echo "Post checkout completed."

      - name: ✅ Complete job
        run: echo "Workflow CI selesai dengan sukses!"
