name: CI_MLflow_Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Set up job - Checkout repository
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # 3. Check environment variables
      - name: Check Env
        run: |
          echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI"
          echo "MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME"

      # 4. Install dependencies
      - name: Install dependencies (conda)
        shell: bash -l {0}
        run: |
          source /usr/share/miniconda/etc/profile.d/conda.sh
          conda env create -f MLProject/conda.yaml || conda env update -f MLProject/conda.yaml --prune
          conda activate mlflow-env
          which python
          python --version

      # 5. Set MLflow Tracking URI
      - name: Set MLflow Tracking URI
        run: |
          echo "Tracking MLflow runs at: $MLFLOW_TRACKING_URI"

      # 6. Run MLflow project
      - name: Run mlflow project
        shell: bash -l {0}
        run: |
          source /usr/share/miniconda/etc/profile.d/conda.sh
          conda activate mlflow-env
          cd MLProject
          mlflow run . --env-manager=local

      # 7. Install Python dependencies (if needed)
      - name: Install Python dependencies
        run: pip install gdown google-auth google-auth-oauthlib google-auth-httplib2

      # 8. Upload results to Google Drive
      - name: Upload to Google Drive
        env:
          GDRIVE_ACCESS_TOKEN: ${{ secrets.GDRIVE_ACCESS_TOKEN }}
        run: |
          echo "📤 Uploading MLflow artifacts to Google Drive..."
          cd MLProject/mlruns/0/
          LATEST_RUN=$(ls -td */ | head -n 1 | cut -d'/' -f1)
          zip -r mlflow_artifacts.zip $LATEST_RUN
          
          curl -X POST -L \
            -H "Authorization: Bearer $GDRIVE_ACCESS_TOKEN" \
            -F "metadata={name : 'mlflow_artifacts_${LATEST_RUN}.zip'};type=application/json;charset=UTF-8" \
            -F "file=@mlflow_artifacts.zip;type=application/zip" \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart"

      # 9. Complete job
      - name: Complete job
        run: echo "✅ Workflow CI selesai dijalankan!"
