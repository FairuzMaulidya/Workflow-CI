name: CI_MLflow_Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Set up job
        run: echo "Starting CI job..."

      - name: 🧩 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.16.2 joblib scikit-learn pandas numpy
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: 🔧 Set MLflow Tracking URI
        run: |
          echo "Setting MLflow Tracking URI..."
          export MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}

      - name: 🚀 Run MLflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local --no-conda || exit 1
          echo "✅ MLflow project completed."
          ls -R .

      - name: 📤 Upload to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          cd MLProject
          if [ ! -d "mlruns" ]; then
            echo "⚠️ Folder mlruns tidak ditemukan, membuat dummy zip..."
            echo "No artifacts found." > dummy.txt
            zip mlruns.zip dummy.txt
          else
            zip -r mlruns.zip mlruns
          fi

          echo "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > credentials.json

          python <<EOF
          import json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_info = json.load(open("credentials.json"))
          creds = service_account.Credentials.from_service_account_info(
              creds_info, scopes=["https://www.googleapis.com/auth/drive.file"]
          )
          service = build("drive", "v3", credentials=creds)
          file_metadata = {"name": "mlruns.zip", "parents": ["${{ secrets.GDRIVE_FOLDER_ID }}"]}
          media = MediaFileUpload("mlruns.zip", mimetype="application/zip")
          file = service.files().create(body=file_metadata, media_body=media, fields="id").execute()
          print("✅ File berhasil diupload ke Google Drive dengan ID:", file.get("id"))
          EOF
